<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Discord Bot × ExamHub - Sprint Master Plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #090d16;
      --bg-card: rgba(17, 24, 39, 0.7);
      --border-color: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent-purple: #8b5cf6;
      --accent-purple-glow: rgba(139, 92, 246, 0.15);
      --accent-green: #10b981;
      --accent-green-glow: rgba(16, 185, 129, 0.15);
      --accent-red: #ef4444;
      --accent-red-glow: rgba(239, 68, 68, 0.15);
      --accent-orange: #f59e0b;
      --accent-orange-glow: rgba(245, 158, 11, 0.15);
      --accent-blue: #3b82f6;
      --accent-blue-glow: rgba(59, 130, 246, 0.15);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-dark);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      line-height: 1.6;
      padding: 40px 20px;
      min-height: 100vh;
      background-image: 
        radial-gradient(at 0% 0%, rgba(139, 92, 246, 0.1) 0px, transparent 50%),
        radial-gradient(at 100% 100%, rgba(59, 130, 246, 0.1) 0px, transparent 50%);
      background-attachment: fixed;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      animation: fadeIn 0.6s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Header Styling */
    header {
      background: linear-gradient(135deg, #1e1b4b 0%, #1e293b 100%);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      padding: 32px;
      margin-bottom: 30px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    header::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -20%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.2) 0%, transparent 70%);
      pointer-events: none;
    }

    .header-tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #a5b4fc;
      text-transform: uppercase;
      margin-bottom: 8px;
      display: inline-block;
    }

    .header-title {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 16px;
      background: linear-gradient(to right, #ffffff, #c7d2fe);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-summary-grid {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .summary-badge {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 13px;
      display: flex;
      align-items: center;
      gap: 8px;
      backdrop-filter: blur(10px);
    }

    .summary-badge strong {
      color: #fff;
    }

    .summary-badge.total-days {
      background: rgba(139, 92, 246, 0.15);
      border-color: rgba(139, 92, 246, 0.3);
      font-weight: 700;
    }

    /* Tabs Styling */
    .sprint-tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      margin-bottom: 24px;
    }

    @media (max-width: 768px) {
      .sprint-tabs {
        grid-template-columns: repeat(2, 1fr);
      }
      .sprint-tabs button:last-child {
        grid-column: span 2;
      }
    }

    .tab-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      color: var(--text-muted);
      font-family: inherit;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(10px);
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .tab-btn:hover {
      border-color: rgba(255, 255, 255, 0.2);
      transform: translateY(-2px);
      color: #fff;
    }

    .tab-btn.active {
      color: #fff;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
    }

    .tab-btn.active[data-sprint="1"] { border-color: var(--accent-purple); background: var(--accent-purple-glow); }
    .tab-btn.active[data-sprint="2"] { border-color: var(--accent-green); background: var(--accent-green-glow); }
    .tab-btn.active[data-sprint="3"] { border-color: var(--accent-red); background: var(--accent-red-glow); }
    .tab-btn.active[data-sprint="4"] { border-color: var(--accent-orange); background: var(--accent-orange-glow); }
    .tab-btn.active[data-sprint="5"] { border-color: var(--accent-blue); background: var(--accent-blue-glow); }

    .tab-btn-icon {
      font-size: 22px;
    }

    .tab-btn-title {
      font-size: 13px;
      font-weight: 700;
    }

    .tab-btn-days {
      font-size: 11px;
      background: rgba(255, 255, 255, 0.05);
      padding: 2px 8px;
      border-radius: 8px;
    }

    /* Content Area */
    .sprint-panel {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 24px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
      overflow: hidden;
      backdrop-filter: blur(15px);
      animation: tabFadeIn 0.4s ease-out;
    }

    @keyframes tabFadeIn {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* Panel Header */
    .panel-header {
      padding: 24px 32px;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .panel-meta {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .panel-icon-wrapper {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.2);
    }

    .panel-title-wrapper h2 {
      font-size: 20px;
      font-weight: 700;
    }

    .panel-title-wrapper p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .panel-goal {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 16px 20px;
      font-size: 14px;
      line-height: 1.6;
    }

    .panel-goal strong {
      display: inline-block;
      margin-right: 6px;
    }

    /* Panel Tasks Body */
    .panel-body {
      padding: 32px;
    }

    .task-group {
      margin-bottom: 24px;
    }

    .task-group-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      padding-bottom: 8px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      margin-bottom: 14px;
      letter-spacing: 0.5px;
    }

    /* Accordion Item */
    .task-item {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      margin-bottom: 10px;
      overflow: hidden;
      transition: all 0.2s ease;
    }

    .task-item:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background: rgba(255, 255, 255, 0.03);
    }

    .task-trigger {
      width: 100%;
      background: none;
      border: none;
      padding: 16px 20px;
      color: inherit;
      font-family: inherit;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      text-align: left;
    }

    .task-info-left {
      display: flex;
      align-items: center;
      gap: 12px;
      flex: 1;
    }

    .task-arrow {
      color: var(--text-muted);
      transition: transform 0.25s ease;
      font-size: 12px;
    }

    .task-item.expanded .task-arrow {
      transform: rotate(90deg);
    }

    .task-name {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
    }

    .task-detail {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    .task-lang-tag {
      font-size: 10px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      background: rgba(255, 255, 255, 0.06);
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.04);
      color: var(--text-muted);
    }

    .task-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      border-top: 1px solid transparent;
    }

    .task-item.expanded .task-content {
      max-height: 2000px; /* high enough for code */
      border-top-color: rgba(255, 255, 255, 0.05);
    }

    .code-container {
      padding: 20px;
      background: #040711;
      position: relative;
    }

    .code-container pre {
      margin: 0;
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 13px;
      color: #e2e8f0;
      overflow-x: auto;
      line-height: 1.7;
      white-space: pre;
    }

    .copy-btn {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s ease;
      z-index: 5;
    }

    .copy-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.15);
    }

    .copy-btn.copied {
      background: var(--accent-green);
      border-color: var(--accent-green);
    }

    /* Footer Nav */
    .bottom-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      gap: 12px;
    }

    .nav-btn {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-main);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s ease;
    }

    .nav-btn:hover:not(:disabled) {
      border-color: rgba(255, 255, 255, 0.15);
      background: rgba(255, 255, 255, 0.05);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .nav-indicator {
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>

        goal: "Xây nền tảng liên kết Discord ID ↔ ExamHub account. Không có sprint này, mọi tính năng sau đều không thể hoạt động.",

                name: "Thêm cột discord_id vào bảng profiles",

                lang: "sql",
                code: `-- migration-discord-integration.sql
ALTER TABLE profiles 
  ADD COLUMN discord_id VARCHAR(20) UNIQUE,
  ADD COLUMN discord_username VARCHAR(100),
  ADD COLUMN discord_linked_at TIMESTAMPTZ;

CREATE INDEX idx_profiles_discord_id 
  ON profiles(discord_id);

-- Bảng lưu token xác thực tạm thời (expire 10 phút)
CREATE TABLE discord_link_tokens (
  id UUID PRIMARY KEY DEFAULT gen_random_uuid(),
  token VARCHAR(8) UNIQUE NOT NULL,
  discord_id VARCHAR(20) NOT NULL,
  discord_username VARCHAR(100),
  expires_at TIMESTAMPTZ NOT NULL 
    DEFAULT (NOW() + INTERVAL '10 minutes'),
  used BOOLEAN DEFAULT FALSE,
  created_at TIMESTAMPTZ DEFAULT NOW()
);

-- Tự xóa token cũ mỗi giờ (pg_cron hoặc trigger)
CREATE OR REPLACE FUNCTION cleanup_expired_tokens()
RETURNS void AS $$
  DELETE FROM discord_link_tokens 
  WHERE expires_at < NOW() OR used = TRUE;
$$ LANGUAGE SQL;`

              {

                detail: "Tổ chức project bot",

├── main.py                 # Entry point

├── requirements.txt
├── cogs/

│   └── role_sync.py        # Sprint 5: Roles
├── services/
│   ├── supabase_client.py  # Supabase REST wrapper
│   ├── examhub_api.py      # Next.js API wrapper
│   └── xp_calculator.py   # Sprint 2
└── utils/
    ├── embeds.py           # Discord Embed builder
    └── token_generator.py  # Tạo token 8 ký tự`
              },
              {
                name: "Lệnh /lienket — flow xác thực 2 bước",
                detail: "Bot tạo token → user nhập trên web → web xác nhận",

                code: `# cogs/account_linker.py
import discord
from discord import app_commands
from discord.ext import commands
from services.supabase_client import SupabaseClient
from utils.token_generator import generate_token
import os

class AccountLinker(commands.Cog):
    def __init__(self, bot):
        self.bot = bot
        self.sb = SupabaseClient()

    @app_commands.command(
        name="lienket",
        description="Liên kết tài khoản Discord với ExamHub"
    )
    async def lienket(self, interaction: discord.Interaction):
        discord_id = str(interaction.user.id)
        
        # Kiểm tra đã link chưa
        existing = await self.sb.get_profile_by_discord(discord_id)
        if existing:
            embed = discord.Embed(
                title="✅ Đã liên kết rồi!",
                description=f"Tài khoản của bạn đã được liên kết với **{existing['full_name']}**",
                color=0x10B981
            )
            return await interaction.response.send_message(embed=embed, ephemeral=True)

        # Tạo token 8 ký tự
        token = generate_token()
        
        # Lưu token vào Supabase (expire 10 phút)
        await self.sb.create_link_token({
            "token": token,
            "discord_id": discord_id,
            "discord_username": str(interaction.user)
        })
        
        web_url = os.getenv("EXAMHUB_URL")
        embed = discord.Embed(
            title="🔗 Liên Kết Tài Khoản ExamHub",
            color=0x7C3AED
        )
        embed.add_field(
            name="Mã xác thực của bạn",
            value=f"Local token: {token}",
            inline=False
        )
        embed.add_field(
            name="Bước tiếp theo",
            value=f"1. Vào [ExamHub]({web_url}/settings/discord)\\n"
                  f"2. Nhập mã **{token}**\\n"
                  f"3. Nhấn **Xác nhận liên kết**",
            inline=False
        )
        embed.set_footer(text="⚠️ Mã hết hạn sau 10 phút")
        
        await interaction.response.send_message(embed=embed, ephemeral=True)`
              },
              {
                name: "Next.js API: POST /api/discord/link-account",

                lang: "typescript",
                code: `// src/app/api/discord/link-account/route.ts
import { createClient } from '@/lib/supabase/server'
import { NextResponse } from 'next/server'

export async function POST(req: Request) {
  const supabase = createClient()
  const { token } = await req.json()
  
  const { data: { user } } = await supabase.auth.getUser()
  if (!user) return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })

  // Tìm token hợp lệ
  const { data: linkToken } = await supabase
    .from('discord_link_tokens')
    .select('*')
    .eq('token', token.toUpperCase())
    .eq('used', false)
    .gt('expires_at', new Date().toISOString())
    .single()

  if (!linkToken) {
    return NextResponse.json({ error: 'Token không hợp lệ hoặc đã hết hạn' }, { status: 400 })
  }

  // Cập nhật profile với discord_id
  const { error } = await supabase
    .from('profiles')
    .update({
      discord_id: linkToken.discord_id,
      discord_username: linkToken.discord_username,
      discord_linked_at: new Date().toISOString()
    })
    .eq('id', user.id)

  if (error) return NextResponse.json({ error: error.message }, { status: 500 })

  // Đánh dấu token đã dùng
  await supabase
    .from('discord_link_tokens')
    .update({ used: true })
    .eq('id', linkToken.id)

  return NextResponse.json({ success: true, discord_id: linkToken.discord_id })
}`

import discord

import asyncio

        # {discord_id: {"joined": datetime, "mute_since": datetime|None}}
        self.active_sessions: dict = {}
        self.sync_xp_loop.start()

    def is_study_channel(self, channel: discord.VoiceChannel) -> bool:
        return channel.name.startswith(STUDY_CHANNEL_PREFIX)

    @commands.Cog.listener()
    async def on_voice_state_update(self, member, before, after):
        discord_id = str(member.id)

        # === JOINED study channel ===
        if after.channel and self.is_study_channel(after.channel):
            if discord_id not in self.active_sessions:
                self.active_sessions[discord_id] = {
                    "joined": datetime.now(timezone.utc),
                    "channel": after.channel.name,
                    "channel_id": str(after.channel.id),
                    "mute_since": datetime.now(timezone.utc) if after.self_mute else None,
                    "afk_violations": 0,
                    "xp_banked": 0,
                }
                # Log session start vào DB
                await self.sb.start_voice_session(discord_id, after.channel)

        # === LEFT study channel ===
        elif before.channel and self.is_study_channel(before.channel):
            if discord_id in self.active_sessions:
                session = self.active_sessions.pop(discord_id)
                await self._finalize_session(member, session)

        # === MIC STATE CHANGED (trong study channel) ===
        if (after.channel and self.is_study_channel(after.channel)
                and discord_id in self.active_sessions):
            session = self.active_sessions[discord_id]
            if after.self_mute and session["mute_since"] is None:
                session["mute_since"] = datetime.now(timezone.utc)
            elif not after.self_mute:
                session["mute_since"] = None

    async def _finalize_session(self, member, session):
        """Tính toán và award XP khi session kết thúc"""
        duration = (datetime.now(timezone.utc) - session["joined"]).seconds // 60
        xp = self.xp_calc.calculate(duration, session["afk_violations"])
        
        # Cộng XP tích lũy trong session

        if xp > 0:
            profile = await self.sb.get_profile_by_discord(str(member.id))
            if profile:
                await self.sb.add_xp(profile["id"], xp)
        
        # Cập nhật session record trong DB
        await self.sb.end_voice_session(str(member.id), duration, xp)

    @tasks.loop(minutes=SYNC_INTERVAL_MINUTES)

class XPCalculator:
    XP_PER_MINUTE = 2
    AFK_PENALTY = 0.5  # Mỗi lần vi phạm giảm 50% XP
    MAX_SESSION_MINUTES = 180  # Tối đa 3 tiếng/session
    BONUS_THRESHOLDS = {
        60: 10,   # Học 1 tiếng: +10 XP bonus
        90: 20,   # Học 1.5 tiếng: +20 XP bonus  
        120: 40,  # Học 2 tiếng: +40 XP bonus
    }

    def calculate(self, duration_minutes: int, afk_violations: int) -> int:
        effective_minutes = min(duration_minutes, self.MAX_SESSION_MINUTES)
        
        # Base XP
        base_xp = effective_minutes * self.XP_PER_MINUTE
        
        # AFK penalty
        penalty_multiplier = (1 - self.AFK_PENALTY) ** afk_violations
        penalized_xp = int(base_xp * penalty_multiplier)
        
        # Bonus XP
        bonus = 0
        for threshold, bonus_xp in self.BONUS_THRESHOLDS.items():
            if effective_minutes >= threshold:
                bonus = bonus_xp
        
        total = penalized_xp + bonus
        return max(0, total)`

import { createClient } from '@/lib/supabase/server'
import { NextResponse } from 'next/server'
import crypto from 'crypto'

function verifyBotSignature(body: string, signature: string): boolean {
  const expected = crypto.createHmac('sha256', process.env.BOT_WEBHOOK_SECRET!).update(body).digest('hex')
  return crypto.timingSafeEqual(Buffer.from(signature), Buffer.from(expected))
}

export async function POST(req: Request) {
  const body = await req.text()
  const signature = req.headers.get('X-Bot-Signature') ?? ''
  if (!verifyBotSignature(body, signature)) return NextResponse.json({ error: 'Unauthorized' }, { status: 401 })
  
  const { event, data } = JSON.parse(body)
  const supabase = createClient()
  
  if (event === 'voice_session_end') {
    await supabase.from('discord_voice_sessions').update({
      left_at: new Date().toISOString(),
      duration_minutes: data.duration_minutes,
      xp_awarded: data.xp_awarded,
      status: 'completed'
    }).eq('discord_id', data.discord_id).eq('status', 'active')
  }
  return NextResponse.json({ success: true })
}`

        discord_id = payload["new"].get("discord_id")
        
        if new_level > old_level and discord_id:
            await self._sync_roles(discord_id, new_level, payload["new"]["full_name"])`
              }
            ]
          },
          {
            group: "📺 YouTube Live Announcer",
            items: [
              {
                name: "Auto-check lịch live và announce",
                detail: "Kiểm tra mỗi 5 phút, announce khi live bắt đầu",
                lang: "python",
                code: `# cogs/role_sync.py
@tasks.loop(minutes=5)
async def check_live_loop(self):
    upcoming = await self.sb.get_upcoming_live_sessions(minutes_ahead=10)
    for live in upcoming:
        channel = self.bot.get_channel(int(os.getenv("LIVE_CHANNEL_ID")))
        youtube_url = f"https://youtube.com/watch?v={live['youtube_id']}"
        
        embed = discord.Embed(title="📺 LIVE CLASS SẮP BẮT ĐẦU!", description=live['title'], color=0xEF4444, url=youtube_url)
        await channel.send(content="@everyone", embed=embed)`
              }
            ]
          },
          {
            group: "✅ Acceptance Criteria",
            items: [
              {
                name: "Checklist Sprint 5 + Final",
                detail: "Các tiêu chuẩn nghiệm thu Sprint 5",
                lang: "markdown",
                code: `✅ Level up trên web → Discord Role thay đổi tự động < 10s
✅ /syncroles → đồng bộ đúng toàn bộ server trong 1 lần
✅ Announce lên cấp kèm tên học sinh trong channel chung
✅ YouTube Live schedule trong DB → bot announce trước 10 phút
✅ Không announce trùng cùng một live session
✅ Bot restart không bị announce lại các event cũ`
              }
            ]
          }
        ]
      }
    ];

    let currentActiveSprint = 1;

    function selectSprint(sprintId) {
      currentActiveSprint = sprintId;
      
      // Update tabs UI
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
      });
      document.querySelector(`.tab-btn[data-sprint="${sprintId}"]`).classList.add('active');
      
      // Render Content Panel
      const sprint = SPRINTS.find(s => s.id === sprintId);
      const panel = document.getElementById('sprint-panel');
      
      // Build tasks HTML
      let tasksHtml = '';
      sprint.tasks.forEach((group, gIdx) => {
        let itemsHtml = '';
        group.items.forEach((item, iIdx) => {
          const uniqueId = `code-${sprintId}-${gIdx}-${iIdx}`;
          
          // Escape code content for HTML
          const escapedCode = item.code
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
            
          itemsHtml += `
            <div class="task-item" id="task-item-${uniqueId}">
              <button class="task-trigger" onclick="toggleTask('${uniqueId}')">
                <div class="task-info-left">
                  <span class="task-arrow">▶</span>
                  <div>
                    <div class="task-name">${item.name}</div>
                    ${item.detail ? `<div class="task-detail">${item.detail}</div>` : ''}
                  </div>
                </div>
                <span class="task-lang-tag">${item.lang}</span>
              </button>
              <div class="task-content" id="content-${uniqueId}">
                <div class="code-container">
                  <button class="copy-btn" onclick="copyCode(this, '${uniqueId}')">Sao chép</button>
                  <pre><code class="language-${item.lang}" id="raw-${uniqueId}">${escapedCode}</code></pre>
                </div>
              </div>
            </div>
          `;
        });

        tasksHtml += `
          <div class="task-group">
            <h3 class="task-group-title">${group.group}</h3>
            ${itemsHtml}
          </div>
        `;
      });

      panel.innerHTML = `
        <div class="panel-header" style="background: ${sprint.bgLight}">
          <div class="panel-meta">
            <div class="panel-icon-wrapper" style="background: ${sprint.color}">
              ${sprint.icon}
            </div>
            <div class="panel-title-wrapper">
              <h2 style="color: ${sprint.color}">Sprint ${sprint.id}: ${sprint.title}</h2>
              <p>${sprint.subtitle} · <strong>Thời gian: ${sprint.days}</strong></p>
            </div>
          </div>
          <div class="panel-goal" style="border-color: ${sprint.color}30">
            <strong style="color: ${sprint.color}">🎯 Mục tiêu:</strong>
            ${sprint.goal}
          </div>
        </div>
        <div class="panel-body">
          ${tasksHtml}
        </div>
      `;

      // Update footer indicator
      document.getElementById('nav-indicator').textContent = `${sprintId} / ${SPRINTS.length}`;
      
      // Update buttons disabled status
      document.getElementById('prev-btn').disabled = sprintId === 1;
      document.getElementById('next-btn').disabled = sprintId === SPRINTS.length;
    }

    function toggleTask(id) {
      const taskItem = document.getElementById(`task-item-${id}`);
      const content = document.getElementById(`content-${id}`);
      
      if (taskItem.classList.contains('expanded')) {
        taskItem.classList.remove('expanded');
        content.style.maxHeight = '0';
      } else {
        taskItem.classList.add('expanded');
        content.style.maxHeight = content.scrollHeight + 'px';
      }
    }

    function copyCode(btn, id) {
      const codeElement = document.getElementById(`raw-${id}`);
      // Unescape text for clipboard
      const textArea = document.createElement('textarea');
      textArea.value = codeElement.textContent;
      document.body.appendChild(textArea);
      textArea.select();
      
      try {
        document.execCommand('copy');
        btn.textContent = '✓ Đã chép';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.textContent = 'Sao chép';
          btn.classList.remove('copied');
        }, 2000);
      } catch (err) {
        console.error('Không thể sao chép code', err);
      }
      
      document.body.removeChild(textArea);
    }

    function navigateSprint(direction) {
      const target = currentActiveSprint + direction;
      if (target >= 1 && target <= SPRINTS.length) {
        selectSprint(target);
      }
    }

    // Initialize first sprint on load
    window.addEventListener('DOMContentLoaded', () => {
      selectSprint(1);
    });
  </script>
</body>
</html>
